<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16122b" />
  <title>Hades II Companion Mobile</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(21, 26, 48, 0.9);
      --panel-2: rgba(31, 38, 70, 0.92);
      --line: rgba(255,255,255,0.1);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #8b5cf6;
      --accent-2: #c084fc;
      --gold: #f59e0b;
      --shadow: 0 14px 40px rgba(0,0,0,.32);
      --radius: 20px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(139,92,246,.32), transparent 30%), linear-gradient(180deg, #090d19 0%, #121729 100%);
      min-height: 100vh; padding-bottom: 88px;
    }
    .app { width: min(100%, 560px); margin: 0 auto; padding: max(14px, env(safe-area-inset-top)) 14px calc(22px + env(safe-area-inset-bottom)); }
    .hero, .card { border: 1px solid var(--line); background: var(--panel); backdrop-filter: blur(12px); border-radius: var(--radius); box-shadow: var(--shadow); }
    .hero { padding: 18px; margin-bottom: 14px; }
    .card { padding: 16px; margin-bottom: 14px; }
    .pill { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--line); background: rgba(255,255,255,.06); padding: 7px 12px; border-radius: 999px; color: var(--muted); font-size: 13px; }
    h1 { font-size: 28px; line-height: 1.08; margin: 12px 0 8px; }
    h2 { font-size: 18px; margin: 0 0 6px; }
    p { color: var(--muted); line-height: 1.55; margin: 0; }
    .small { font-size: 13px; color: var(--muted); }
    .top-actions, .chips, .action-row, .quick-filters { display: flex; gap: 8px; flex-wrap: wrap; }
    button, input { font: inherit; } button { border: 0; cursor: pointer; color: inherit; }
    .btn { min-height: 44px; padding: 11px 14px; border-radius: 14px; background: rgba(255,255,255,.06); border: 1px solid var(--line); color: var(--text); transition: transform .15s ease; }
    .btn:active { transform: scale(.98); }
    .btn.primary, .btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; }
    .btn.gold { background: linear-gradient(135deg, #f59e0b, #fbbf24); border-color: transparent; color: #111827; font-weight: 700; }
    .search { width: 100%; min-height: 46px; margin-top: 12px; padding: 12px 14px; border-radius: 14px; border: 1px solid var(--line); background: rgba(255,255,255,.06); color: var(--text); outline: none; }
    .weapon-scroller, .aspect-scroller, .god-scroller { display: grid; gap: 10px; grid-auto-flow: column; grid-auto-columns: 84%; overflow-x: auto; padding-bottom: 4px; scroll-snap-type: x proximity; }
    .weapon-card, .aspect-card, .god-card, .choice-card, .line-card, .check-item { border: 1px solid var(--line); background: var(--panel-2); border-radius: 18px; }
    .weapon-card { padding: 14px; display: grid; grid-template-columns: 54px 1fr; gap: 12px; align-items: center; scroll-snap-align: start; }
    .weapon-card.active, .aspect-card.active, .build-btn.active, .god-card.active, .choice-card.recommended { outline: 2px solid rgba(192,132,252,.75); }
    .weapon-icon, .god-icon, .choice-icon { width: 54px; height: 54px; border-radius: 16px; display: grid; place-items: center; background: rgba(255,255,255,.08); font-size: 28px; }
    .hero-art { margin-top: 14px; padding: 16px; border-radius: 22px; border: 1px solid var(--line); background: linear-gradient(135deg, rgba(139,92,246,.25), rgba(244,114,182,.18)); display: grid; gap: 12px; justify-items: center; }
    .main-art, .aspect-art { width: 100%; display: grid; place-items: center; border-radius: 22px; border: 1px solid var(--line); background: rgba(255,255,255,.05); }
    .main-art { min-height: 150px; font-size: 72px; }
    .aspect-art { min-height: 82px; font-size: 42px; }
    .summary-strip { position: sticky; top: 8px; z-index: 8; margin-bottom: 14px; padding: 12px 14px; border-radius: 18px; border: 1px solid rgba(245,158,11,.22); background: linear-gradient(135deg, rgba(245,158,11,.16), rgba(139,92,246,.18)); backdrop-filter: blur(12px); box-shadow: var(--shadow); }
    .summary-top { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .summary-main { margin-top: 8px; font-size: 15px; font-weight: 700; }
    .stat-grid, .build-grid, .choice-grid, .note-grid, .check-grid { display: grid; gap: 10px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); margin-top: 14px; }
    .build-grid { grid-template-columns: repeat(2, 1fr); }
    .choice-grid, .note-grid, .check-grid { grid-template-columns: 1fr; }
    .stat label { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
    .bar > span { height: 100%; display: block; background: linear-gradient(90deg, #818cf8, #c084fc); }
    .aspect-card, .build-btn, .god-card, .choice-card, .line-card, .check-item { padding: 12px; }
    .aspect-preview { height: 68px; border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--line); display: grid; place-items: center; font-size: 30px; }
    .god-card, .choice-card { text-align: left; width: 100%; }
    .god-top, .choice-top { display: flex; gap: 12px; align-items: center; }
    .recommendation-hero { border: 1px solid rgba(245,158,11,.22); background: linear-gradient(135deg, rgba(245,158,11,.18), rgba(139,92,246,.18)); border-radius: 22px; padding: 16px; box-shadow: var(--shadow); }
    .chip { border-radius: 999px; padding: 6px 10px; font-size: 12px; background: rgba(139,92,246,.18); color: #e9d5ff; border: 1px solid rgba(139,92,246,.25); }
    .callout { padding: 13px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
    .callout.info { background: rgba(99,102,241,.14); border: 1px solid rgba(99,102,241,.25); color: #c7d2fe; }
    .callout.ok { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.24); color: #a7f3d0; }
    .callout.soft { background: rgba(255,255,255,.05); border: 1px solid var(--line); color: var(--muted); }
    .quality { padding: 14px; border-radius: 18px; border: 1px solid var(--line); }
    .quality.ok { background: rgba(16,185,129,.12); } .quality.mid { background: rgba(59,130,246,.12); } .quality.warn { background: rgba(245,158,11,.12); } .quality.bad { background: rgba(244,63,94,.12); }
    .quality-top { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .check-item { display: flex; gap: 10px; align-items: flex-start; }
    .check-item input { margin-top: 3px; transform: scale(1.15); }
    details { border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.04); overflow: hidden; }
    summary { list-style: none; cursor: pointer; padding: 14px 16px; font-weight: 700; }
    summary::-webkit-details-marker { display: none; }
    .details-body { padding: 0 16px 16px; }
    .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; border-top: 1px solid var(--line); background: rgba(11,16,32,.96); backdrop-filter: blur(12px); padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: min(100%, 560px); margin: 0 auto; }
    .sheet button { min-height: 50px; border-radius: 16px; background: rgba(255,255,255,.05); border: 1px solid var(--line); font-size: 12px; }
    .sheet button.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="summary-strip" id="summaryStrip"></div>
    <div class="hero">
      <div class="pill">📱 Hades II Mobile Companion v5</div>
      <h1>Run simple, pero con prioridades mejores</h1>
      <p>La recomendación ahora compara todo lo que viste en la estancia y puede preferir martillo, granada o puerta antes que un dios alternativo.</p>
      <div class="top-actions" style="margin-top:12px;">
        <button class="btn primary" id="quickStartBtn">Build inicial</button>
        <button class="btn" id="resetBtn">Reiniciar</button>
      </div>
    </div>
    <div class="card">
      <h2>Buscar arma</h2>
      <input class="search" id="searchInput" type="text" placeholder="Ej: hacha, cráneo, rápida..." />
      <div class="weapon-scroller" id="weaponList" style="margin-top:12px;"></div>
    </div>
    <div id="screen-overview"></div>
    <div id="screen-build" class="hidden"></div>
    <div id="screen-run" class="hidden"></div>
    <div id="screen-guide" class="hidden"></div>
  </div>
  <div class="sheet">
    <button class="active" data-screen="overview">Resumen</button>
    <button data-screen="build">Build</button>
    <button data-screen="run">Run</button>
    <button data-screen="guide">Guía</button>
  </div>

  <script>
    const gods = {
      zeus:{name:'Zeus',icon:'⚡',type:'Golpes rápidos',summary:'Ideal para armas o patrones con muchos impactos.',color:'linear-gradient(135deg,#fde68a,#fbbf24)'},
      poseidon:{name:'Poseidón',icon:'🌊',type:'Control y limpieza',summary:'Muy cómodo para limpiar salas.',color:'linear-gradient(135deg,#bae6fd,#67e8f9)'},
      hestia:{name:'Hestia',icon:'🔥',type:'Daño constante',summary:'Muy buena para daño sostenido.',color:'linear-gradient(135deg,#fdba74,#f87171)'},
      hephaestus:{name:'Hefesto',icon:'🔨',type:'Daño extra',summary:'Funciona bien con armas rápidas.',color:'linear-gradient(135deg,#d6d3d1,#a8a29e)'},
      aphrodite:{name:'Afrodita',icon:'💗',type:'Golpes fuertes',summary:'Excelente para daño alto por impacto.',color:'linear-gradient(135deg,#fbcfe8,#fda4af)'},
      demeter:{name:'Deméter',icon:'❄️',type:'Control y seguridad',summary:'Ideal para armas lentas.',color:'linear-gradient(135deg,#dbeafe,#c4b5fd)'},
      apollo:{name:'Apolo',icon:'☀️',type:'Espacio y consistencia',summary:'Muy bueno para limpieza y alcance.',color:'linear-gradient(135deg,#fef3c7,#fde68a)'},
      hera:{name:'Hera',icon:'👑',type:'Builds planificadas',summary:'Gran techo de daño.',color:'linear-gradient(135deg,#ddd6fe,#f5d0fe)'},
      ares:{name:'Ares',icon:'🗡️',type:'Agresión',summary:'Muy bueno para jefes.',color:'linear-gradient(135deg,#fecdd3,#fdba74)'},
      hermes:{name:'Hermes',icon:'💨',type:'Fluidez',summary:'Mejora movilidad y ritmo.',color:'linear-gradient(135deg,#d1fae5,#99f6e4)'},
      selene:{name:'Selene',icon:'🌙',type:'Hex y magia',summary:'Brilla con builds de magia.',color:'linear-gradient(135deg,#e0e7ff,#e2e8f0)'}
    };
    const rewards = {
      dios:{name:'Dios',icon:'✨',desc:'Más bendiciones para fortalecer tu build.'},
      martillo:{name:'Martillo de Dédalo',icon:'🔨',desc:'Mejora fuerte del arma. Muy valioso.'},
      granada:{name:'Granada',icon:'🍎',desc:'Mejora una bendición que ya tienes.'},
      corazon:{name:'Corazón',icon:'❤️',desc:'Más vida máxima.'},
      mana:{name:'Magia',icon:'🔵',desc:'Más apoyo para omega y hexes.'},
      monedas:{name:'Monedas',icon:'🪙',desc:'Sirven para comprar mejoras.'},
      caos:{name:'Caos',icon:'🌀',desc:'Riesgo a corto plazo con recompensa fuerte.'},
      selene:{name:'Selene',icon:'🌙',desc:'Opciones ligadas a hexes y magia.'}
    };
    const rewardKeys = Object.keys(rewards);
    const allGodKeys = ['zeus','poseidon','hestia','hephaestus','aphrodite','demeter','apollo','hera','ares','hermes','selene'];
    const weapons = [
      {id:'axe',icon:'🪓',name:'Hacha de Piedra Lunar',category:'Pesada / golpe fuerte',playstyle:'Lenta, poderosa, castiga ventanas con mucha fuerza.',speed:30,burst:96,control:72,comfort:57,coreStyle:'heavy',aspects:[{id:'melinoe',name:'Aspecto de Melínoe',style:'Pesada clásica',focus:'Golpes fuertes',topGods:['aphrodite','demeter','apollo','hera','ares'],buildTypes:{attack:{gods:['aphrodite','demeter','apollo'],duo:['aphrodite','demeter'],avoid:['zeus']},special:{gods:['apollo','hera','demeter'],duo:['hera','apollo'],avoid:['poseidon']},cast:{gods:['apollo','demeter'],duo:['demeter','apollo'],avoid:['hestia']},omega:{gods:['hera','demeter','selene'],duo:['hera','demeter'],avoid:['zeus']}}},{id:'thanatos',name:'Aspecto de Tánatos',style:'Ofensiva máxima',focus:'Burst y jefe',topGods:['ares','aphrodite','hera','demeter'],buildTypes:{attack:{gods:['ares','aphrodite','demeter'],duo:['ares','aphrodite'],avoid:['zeus']},special:{gods:['hera','apollo'],duo:['ares','hera'],avoid:['poseidon']},cast:{gods:['demeter','apollo'],duo:['demeter','apollo'],avoid:['hestia']},omega:{gods:['hera','selene'],duo:['ares','hera'],avoid:['poseidon']}}}]},
      {id:'blades',icon:'🗡️',name:'Hojas Hermanas',category:'Rápida / agresiva',playstyle:'Combate cercano veloz.',speed:95,burst:78,control:48,comfort:52,coreStyle:'rapid',aspects:[{id:'melinoe',name:'Aspecto de Melínoe',style:'Rapidez pura',focus:'Ataque rápido',topGods:['zeus','poseidon','hestia','hephaestus','hermes'],buildTypes:{attack:{gods:['zeus','poseidon','hestia'],duo:['zeus','poseidon'],avoid:['aphrodite']},special:{gods:['hestia','poseidon','hephaestus'],duo:['zeus','hestia'],avoid:['hera']},cast:{gods:['demeter','apollo'],duo:['aphrodite','demeter'],avoid:['ares']},omega:{gods:['demeter','selene'],duo:['aphrodite','demeter'],avoid:['poseidon']}}}]},
      {id:'staff',icon:'🪄',name:'Báculo de la Bruja',category:'Técnica / híbrida',playstyle:'Segura, flexible, buena para empezar.',speed:55,burst:60,control:78,comfort:88,coreStyle:'cast',aspects:[{id:'melinoe',name:'Aspecto de Melínoe',style:'Equilibrado',focus:'Ataque / control básico',topGods:['apollo','demeter','hera','hermes'],buildTypes:{attack:{gods:['apollo','demeter','aphrodite'],duo:['apollo','demeter'],avoid:['zeus']},special:{gods:['apollo','hera','demeter'],duo:['apollo','hera'],avoid:['hephaestus']},cast:{gods:['apollo','demeter','selene'],duo:['apollo','demeter'],avoid:['ares']},omega:{gods:['demeter','hera','selene'],duo:['hera','demeter'],avoid:['poseidon']}}}]},
      {id:'skull',icon:'💀',name:'Cráneo Argénteo',category:'Técnica / burst',playstyle:'Munición y daño muy alto.',speed:52,burst:88,control:72,comfort:50,coreStyle:'cast',aspects:[{id:'melinoe',name:'Aspecto de Melínoe',style:'Equilibrado',focus:'Burst base',topGods:['hera','apollo','aphrodite','demeter'],buildTypes:{attack:{gods:['hera','aphrodite','apollo'],duo:['hera','aphrodite'],avoid:['zeus']},special:{gods:['apollo','hera','demeter'],duo:['hera','apollo'],avoid:['poseidon']},cast:{gods:['apollo','demeter','selene'],duo:['demeter','apollo'],avoid:['hestia']},omega:{gods:['hera','selene','demeter'],duo:['hera','demeter'],avoid:['zeus']}}}]},
      {id:'coat',icon:'🧥',name:'Manto Negro',category:'Híbrida / dinámica',playstyle:'Combina combate cercano y presión a distancia.',speed:84,burst:76,control:66,comfort:64,coreStyle:'rapid',aspects:[{id:'melinoe',name:'Aspecto de Melínoe',style:'Híbrido base',focus:'Ritmo y versatilidad',topGods:['zeus','hestia','poseidon','aphrodite','demeter'],buildTypes:{attack:{gods:['zeus','hestia','poseidon'],duo:['zeus','hestia'],avoid:['hera']},special:{gods:['poseidon','hestia','hephaestus'],duo:['zeus','poseidon'],avoid:['ares']},cast:{gods:['apollo','demeter'],duo:['aphrodite','demeter'],avoid:['zeus']},omega:{gods:['demeter','selene','hera'],duo:['aphrodite','demeter'],avoid:['poseidon']}}}]},
      {id:'flames',icon:'🔥',name:'Llamas Umbrales',category:'Rápida / técnica',playstyle:'Muchos impactos y posicionamiento.',speed:92,burst:58,control:70,comfort:60,coreStyle:'rapid',aspects:[{id:'melinoe',name:'Aspecto de Melínoe',style:'Volumen de impactos',focus:'Ataque y presión',topGods:['zeus','hestia','poseidon','hephaestus'],buildTypes:{attack:{gods:['zeus','hestia','poseidon'],duo:['zeus','hestia'],avoid:['aphrodite']},special:{gods:['hestia','hephaestus','poseidon'],duo:['zeus','poseidon'],avoid:['hera']},cast:{gods:['apollo','demeter'],duo:['demeter','apollo'],avoid:['ares']},omega:{gods:['demeter','selene'],duo:['demeter','apollo'],avoid:['poseidon']}}}]}
    ];

    const state = { selectedWeaponId:'axe', selectedAspectId:'melinoe', buildType:'attack', goal:'beginner', pickedGods:[], seenOffers:[], seenDoors:[], search:'', runState:{mainBoon:false,secondGod:false,duoPlan:false,magickPlan:false,survivalPlan:false}, screen:'overview' };
    const summaryStrip = document.getElementById('summaryStrip');
    const searchInput = document.getElementById('searchInput');
    const weaponList = document.getElementById('weaponList');
    const screens = { overview:document.getElementById('screen-overview'), build:document.getElementById('screen-build'), run:document.getElementById('screen-run'), guide:document.getElementById('screen-guide') };
    document.getElementById('quickStartBtn').onclick = () => { state.selectedWeaponId='axe'; state.selectedAspectId='melinoe'; state.buildType='attack'; resetRun(false); };
    document.getElementById('resetBtn').onclick = () => resetRun(true);
    searchInput.addEventListener('input', e => { state.search = e.target.value.toLowerCase().trim(); renderWeapons(); });
    document.querySelectorAll('.sheet button').forEach(btn => btn.addEventListener('click', () => { state.screen = btn.dataset.screen; renderScreens(); }));

    function getSelectedWeapon(){ return weapons.find(w => w.id===state.selectedWeaponId) || weapons[0]; }
    function syncAspect(){ const w=getSelectedWeapon(); if(!w.aspects.find(a=>a.id===state.selectedAspectId)) state.selectedAspectId=w.aspects[0].id; }
    function getSelectedAspect(){ const w=getSelectedWeapon(); return w.aspects.find(a=>a.id===state.selectedAspectId) || w.aspects[0]; }
    function getBuildInfo(){ return getSelectedAspect().buildTypes[state.buildType]; }
    function qualityInfo(score){ if(score>=80) return {label:'Sólida',cls:'ok'}; if(score>=60) return {label:'Encaminada',cls:'mid'}; if(score>=40) return {label:'Inestable',cls:'warn'}; return {label:'Débil',cls:'bad'}; }
    function artEmoji(id){ return ({staff:'🪄',blades:'🗡️',flames:'🔥',axe:'🪓',skull:'💀',coat:'🧥'})[id] || '✨'; }
    function aspectGradient(id){ return ({melinoe:'linear-gradient(135deg,#f5d0fe,#ddd6fe,#e0e7ff)',thanatos:'linear-gradient(135deg,#fecdd3,#fed7aa,#fde68a)'})[id] || 'linear-gradient(135deg,#f5d0fe,#ddd6fe,#e0e7ff)'; }
    function togglePickedGod(key){ const i=state.pickedGods.indexOf(key); if(i>=0) state.pickedGods.splice(i,1); else state.pickedGods.push(key); state.seenOffers=state.seenOffers.filter(g=>g!==key); render(); }
    function toggleOffer(key){ const i=state.seenOffers.indexOf(key); if(i>=0) state.seenOffers.splice(i,1); else state.seenOffers.push(key); render(); }
    function toggleDoor(key){ const i=state.seenDoors.indexOf(key); if(i>=0) state.seenDoors.splice(i,1); else state.seenDoors.push(key); render(); }
    function selectWeapon(id){ state.selectedWeaponId=id; state.pickedGods=[]; state.seenOffers=[]; state.seenDoors=[]; state.runState={mainBoon:false,secondGod:false,duoPlan:false,magickPlan:false,survivalPlan:false}; syncAspect(); render(); }
    function setAspect(id){ state.selectedAspectId=id; state.pickedGods=[]; state.seenOffers=[]; state.seenDoors=[]; render(); }
    function setBuildType(type){ state.buildType=type; state.pickedGods=[]; state.seenOffers=[]; state.seenDoors=[]; render(); }
    function setGoal(goal){ state.goal=goal; render(); }
    function toggleCheck(key){ state.runState[key]=!state.runState[key]; render(); }
    function resetRun(keepWeapon=true){ if(!keepWeapon){ state.goal='beginner'; } state.pickedGods=[]; state.seenOffers=[]; state.seenDoors=[]; state.runState={mainBoon:false,secondGod:false,duoPlan:false,magickPlan:false,survivalPlan:false}; render(); }
    function nextRoom(){ state.seenOffers=[]; state.seenDoors=[]; render(); }
    function clearOffers(){ state.seenOffers=[]; render(); }
    function clearDoors(){ state.seenDoors=[]; render(); }

    function godPriorityScore(godKey, buildInfo, aspect){
      let score=0;
      if(buildInfo.gods[0]===godKey) score+=100;
      if(buildInfo.gods[1]===godKey) score+=80;
      if(buildInfo.gods[2]===godKey) score+=55;
      if(buildInfo.duo.includes(godKey)) score+=20;
      if(aspect.topGods.includes(godKey)) score+=10;
      if(state.pickedGods.includes(godKey)) score-=60;
      if(buildInfo.avoid.includes(godKey)) score-=80;
      const completesDuo = buildInfo.duo.includes(godKey) && state.pickedGods.some(g => buildInfo.duo.includes(g));
      if(completesDuo) score += 55;
      if(state.pickedGods.length >= 2 && !completesDuo && godKey !== buildInfo.gods[0] && godKey !== buildInfo.gods[1]) score -= 20;
      return score;
    }

    function doorPriorityScore(doorKey, buildInfo, weapon){
      let score=0;
      const godsTaken=state.pickedGods.length;
      const duoIncomplete=!buildInfo.duo.every(g=>state.pickedGods.includes(g));
      if(doorKey==='martillo') score += godsTaken >= 1 ? 96 : 84;
      if(doorKey==='dios') score += !state.runState.mainBoon ? 92 : duoIncomplete ? 58 : 42;
      if(doorKey==='granada') score += godsTaken >= 2 ? 64 : godsTaken >= 1 ? 48 : 18;
      if(doorKey==='mana') score += (state.buildType==='omega' || state.buildType==='cast' || !state.runState.magickPlan) ? 72 : 22;
      if(doorKey==='corazon') score += !state.runState.survivalPlan ? 60 : 28;
      if(doorKey==='monedas') score += 30;
      if(doorKey==='caos') score += godsTaken >= 1 ? 56 : 16;
      if(doorKey==='selene') score += (state.buildType==='omega' || state.buildType==='cast') ? 70 : 24;
      if(weapon.coreStyle==='heavy' && doorKey==='martillo') score += 14;
      if(weapon.coreStyle==='rapid' && doorKey==='granada') score += 10;
      if(weapon.coreStyle==='cast' && (doorKey==='mana' || doorKey==='selene')) score += 12;
      return score;
    }

    function compute(){
      const weapon=getSelectedWeapon();
      const aspect=getSelectedAspect();
      const buildInfo=getBuildInfo();
      const activePlanSupport=buildInfo.gods.filter(g=>state.pickedGods.includes(g)).length;
      let score=20 + Math.min(activePlanSupport,3)*12 + Object.values(state.runState).filter(Boolean).length*6;
      if(state.pickedGods.includes(buildInfo.gods[0])) score += 25;
      if(state.pickedGods.includes(buildInfo.gods[1])) score += 15;
      if(buildInfo.duo.every(g=>state.pickedGods.includes(g))) score += 10;
      score=Math.max(0,Math.min(100,score));
      const nextRecommendedGod = allGodKeys.map(key=>({key,score:godPriorityScore(key,buildInfo,aspect)})).sort((a,b)=>b.score-a.score).find(x=>!state.pickedGods.includes(x.key));
      const offeredRanked = state.seenOffers.map(key=>({key,score:godPriorityScore(key,buildInfo,aspect)})).sort((a,b)=>b.score-a.score);
      const doorsRanked = state.seenDoors.map(key=>({key,score:doorPriorityScore(key,buildInfo,weapon)})).sort((a,b)=>b.score-a.score);
      const recommendedOffer = offeredRanked[0]?.key || null;
      const recommendedDoor = doorsRanked[0]?.key || null;
      let primaryChoice = null;
      const bestGod = offeredRanked[0];
      const bestDoor = doorsRanked[0];
      if(bestGod || bestDoor){
        if((bestDoor?.score ?? -999) > (bestGod?.score ?? -999)) primaryChoice = {type:'puerta',key:bestDoor.key};
        else primaryChoice = {type:'dios',key:bestGod.key};
      }
      const pivotMessage = state.pickedGods.length >=2 && !buildInfo.duo.every(g=>state.pickedGods.includes(g)) ? 'Si sigues recibiendo piezas fuera de tu núcleo, podrías cambiar de plan.' : 'Tu plan actual sigue viéndose bien.';
      const checkGuidance = !state.runState.mainBoon ? 'Primero asegura una bendición principal.' : !state.runState.secondGod ? 'Ahora falta el dios complementario.' : !state.runState.duoPlan ? 'Ya puedes orientar la run hacia una dupla.' : !state.runState.magickPlan ? 'Revisa si tu magia/omega está resuelta.' : !state.runState.survivalPlan ? 'Te queda revisar defensa y control.' : 'Tu build está bastante bien resuelta.';
      return {weapon,aspect,buildInfo,score,nextRecommendedGod,recommendedOffer,recommendedDoor,primaryChoice,offeredRanked,doorsRanked,pivotMessage,checkGuidance};
    }

    function confirmPrimaryChoice(){ const {primaryChoice}=compute(); if(!primaryChoice) return; if(primaryChoice.type==='dios') togglePickedGod(primaryChoice.key); else nextRoom(); }
    window.toggleOffer=toggleOffer; window.toggleDoor=toggleDoor; window.togglePickedGod=togglePickedGod; window.selectWeapon=selectWeapon; window.setAspect=setAspect; window.setBuildType=setBuildType; window.setGoal=setGoal; window.toggleCheck=toggleCheck; window.confirmPrimaryChoice=confirmPrimaryChoice; window.nextRoom=nextRoom; window.clearOffers=clearOffers; window.clearDoors=clearDoors;

    function renderWeapons(){ const items=weapons.filter(w=>!state.search || `${w.name} ${w.category} ${w.playstyle}`.toLowerCase().includes(state.search)); weaponList.innerHTML=items.map(w=>`<button class="weapon-card ${w.id===state.selectedWeaponId?'active':''}" onclick="selectWeapon('${w.id}')"><div class="weapon-icon">${w.icon}</div><div><div><strong>${w.name}</strong></div><div class="small">${w.category}</div></div></button>`).join(''); }
    function renderScreens(){ Object.entries(screens).forEach(([k,el])=>el.classList.toggle('hidden',k!==state.screen)); document.querySelectorAll('.sheet button').forEach(btn=>btn.classList.toggle('active',btn.dataset.screen===state.screen)); }
    function stat(label,v){ return `<div class="stat"><label><span>${label}</span><span>${v}/100</span></label><div class="bar"><span style="width:${v}%"></span></div></div>`; }

    function render(){
      syncAspect(); renderWeapons(); renderScreens();
      const {weapon,aspect,buildInfo,score,nextRecommendedGod,recommendedOffer,recommendedDoor,primaryChoice,offeredRanked,doorsRanked,pivotMessage,checkGuidance}=compute();
      const q=qualityInfo(score);
      const buildTypeLabel=state.buildType==='attack'?'Ataque':state.buildType==='special'?'Especial':state.buildType==='cast'?'Cast':'Omega';
      summaryStrip.innerHTML=`<div class="summary-top"><div class="pill">${weapon.name} · ${buildTypeLabel}</div><div class="small">${aspect.name}</div></div><div class="summary-main">${nextRecommendedGod?`Próxima prioridad: ${gods[nextRecommendedGod.key].name}`:'Sigue cerrando tu build actual'}</div><div class="chips" style="margin-top:8px;">${state.pickedGods.length?state.pickedGods.map(g=>`<span class="chip">${gods[g].name}</span>`).join(''):'<span class="chip">Sin dioses tomados</span>'}</div>`;

      screens.overview.innerHTML=`<div class="card"><div class="pill">${weapon.category}</div><h2 style="margin-top:10px; font-size:24px;">${weapon.name}</h2><p>${weapon.playstyle}</p><div class="hero-art"><div class="main-art">${artEmoji(weapon.id)}</div><div class="aspect-art" style="background:${aspectGradient(aspect.id)};">${artEmoji(weapon.id)}</div></div><div class="stat-grid">${stat('Velocidad',weapon.speed)}${stat('Burst',weapon.burst)}${stat('Control',weapon.control)}${stat('Comodidad',weapon.comfort)}</div></div><div class="card"><h2>Estado de la build</h2><div class="quality ${q.cls}" style="margin-top:10px;"><div class="quality-top"><span>Calidad estimada</span><span>${q.label}</span></div><div style="font-size:30px;font-weight:800;margin-top:8px;">${score}/100</div><div class="bar" style="margin-top:10px;"><span style="width:${score}%"></span></div></div></div>`;

      screens.build.innerHTML=`<div class="card"><h2>Aspecto</h2><div class="aspect-scroller" style="margin-top:12px;">${weapon.aspects.map(a=>`<button class="aspect-card ${a.id===state.selectedAspectId?'active':''}" onclick="setAspect('${a.id}')"><div class="aspect-preview" style="background:${aspectGradient(a.id)};">${artEmoji(weapon.id)}</div><div><strong>${a.name}</strong></div><div class="small">${a.style}</div><div class="small">${a.focus}</div></button>`).join('')}</div></div><div class="card"><h2>Tipo de build</h2><div class="build-grid" style="margin-top:12px;">${['attack','special','cast','omega'].map(type=>{const label=type==='attack'?'Ataque':type==='special'?'Especial':type==='cast'?'Cast':'Omega'; return `<button class="build-btn ${state.buildType===type?'active':''}" onclick="setBuildType('${type}')"><strong>${label}</strong></button>`;}).join('')}</div></div><div class="card"><h2>Dioses principales del plan</h2><div class="god-scroller" style="margin-top:12px;">${buildInfo.gods.map(g=>`<button class="god-card ${state.pickedGods.includes(g)?'active':''}" onclick="togglePickedGod('${g}')"><div class="god-top"><div class="god-icon" style="background:${gods[g].color}">${gods[g].icon}</div><div><strong>${gods[g].name}</strong><div class="small">Toca para marcar que ya lo tomaste</div></div></div></button>`).join('')}</div></div>`;

      screens.run.innerHTML=`<div class="recommendation-hero"><div class="small">MEJOR ELECCIÓN AHORA</div><div style="font-size:24px; font-weight:800; margin-top:6px;">${primaryChoice ? (primaryChoice.type==='dios' ? `${gods[primaryChoice.key].icon} ${gods[primaryChoice.key].name}` : `${rewards[primaryChoice.key].icon} ${rewards[primaryChoice.key].name}`) : 'Marca opciones para recibir recomendación'}</div><div class="small" style="margin-top:8px; color:#f8fafc; opacity:.9;">${primaryChoice ? (primaryChoice.type==='dios' ? 'Entre todo lo que viste, este dios pesa más para tu build.' : 'Entre todo lo que viste, esta puerta te da más valor ahora.') : 'Primero marca lo que te apareció en la estancia.'}</div><div class="action-row" style="margin-top:12px;">${primaryChoice?'<button class="btn gold" onclick="confirmPrimaryChoice()">Confirmar elección</button>':''}<button class="btn" onclick="nextRoom()">Siguiente estancia</button></div></div><div class="card"><h2>Paso 1: ¿Qué dioses te aparecieron?</h2><div class="choice-grid" style="margin-top:12px;">${allGodKeys.map(g=>`<button class="choice-card ${recommendedOffer===g?'recommended':''}" onclick="toggleOffer('${g}')"><div class="choice-top"><div class="choice-icon" style="background:${gods[g].color}">${gods[g].icon}</div><div><strong>${gods[g].name}</strong><div class="small">${state.seenOffers.includes(g)?'Marcado':'Tocar para marcar'}</div></div></div></button>`).join('')}</div><div class="action-row" style="margin-top:12px;"><button class="btn" onclick="clearOffers()">Limpiar dioses</button></div></div><div class="card"><h2>Paso 2: ¿Qué recompensas o puertas viste?</h2><div class="choice-grid" style="margin-top:12px;">${rewardKeys.map(k=>`<button class="choice-card ${recommendedDoor===k?'recommended':''}" onclick="toggleDoor('${k}')"><div class="choice-top"><div class="choice-icon">${rewards[k].icon}</div><div><strong>${rewards[k].name}</strong><div class="small">${state.seenDoors.includes(k)?'Marcada':'Tocar para marcar'}</div></div></div></button>`).join('')}</div><div class="action-row" style="margin-top:12px;"><button class="btn" onclick="clearDoors()">Limpiar puertas</button></div></div><details class="card"><summary>Ver análisis avanzado</summary><div class="details-body"><div class="callout info">${pivotMessage}</div><div class="callout.soft" style="margin-top:10px;"></div><div class="chips" style="margin-top:10px;">${state.pickedGods.length?state.pickedGods.map(g=>`<span class="chip">${gods[g].name}</span>`).join(''):'<span class="chip">Sin dioses tomados</span>'}</div>${offeredRanked.length?`<div class="small" style="margin-top:12px;">Orden de dioses: ${offeredRanked.map(x=>gods[x.key].name).join(' → ')}</div>`:''}${doorsRanked.length?`<div class="small" style="margin-top:8px;">Orden de puertas: ${doorsRanked.map(x=>rewards[x.key].name).join(' → ')}</div>`:''}</div></details>`;

      screens.guide.innerHTML=`<div class="card"><h2>Cómo usar la run</h2><div class="callout info">1. Marca los dioses que te salieron. 2. Marca las puertas o recompensas que viste. 3. Mira la tarjeta grande de recomendación. 4. Si elegiste esa opción, toca <strong>Confirmar elección</strong>. 5. Usa <strong>Siguiente estancia</strong> para limpiar lo temporal.</div></div><details class="card"><summary>Ver checklist</summary><div class="details-body"><div class="check-grid" style="margin-top:12px;">${[['mainBoon','Ya encontré mi bendición principal'],['secondGod','Ya tengo mi segundo dios complementario'],['duoPlan','Ya sé qué dupla quiero perseguir'],['magickPlan','Mi magia / omega está resuelta'],['survivalPlan','Tengo control o supervivencia suficiente']].map(([k,l])=>`<label class="check-item"><input type="checkbox" ${state.runState[k]?'checked':''} onchange="toggleCheck('${k}')" /><span>${l}</span></label>`).join('')}</div><div class="callout soft" style="margin-top:12px;">${checkGuidance}</div></div></details><div class="card"><h2>Recompensas en español</h2><div class="note-grid" style="margin-top:12px;">${rewardKeys.map(k=>`<div class="line-card"><strong>${rewards[k].icon} ${rewards[k].name}</strong><div class="small" style="margin-top:6px;">${rewards[k].desc}</div></div>`).join('')}</div></div>`;
    }

    if('serviceWorker' in navigator){ const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());`; const blob=new Blob([swCode],{type:'text/javascript'}); const swUrl=URL.createObjectURL(blob); navigator.serviceWorker.register(swUrl).catch(()=>{}); }
    render();
  </script>
</body>
</html>
