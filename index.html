<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16122b" />
  <title>Hades II Companion Mobile</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #16122b;
      --panel: rgba(21, 26, 48, 0.9);
      --panel-2: rgba(31, 38, 70, 0.9);
      --line: rgba(255,255,255,0.1);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #8b5cf6;
      --accent-2: #c084fc;
      --ok: #10b981;
      --warn: #f59e0b;
      --bad: #f43f5e;
      --shadow: 0 14px 40px rgba(0,0,0,.32);
      --radius: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(139,92,246,.32), transparent 30%),
        linear-gradient(180deg, #090d19 0%, #121729 100%);
      min-height: 100vh;
      padding-bottom: 88px;
    }

    .app {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 14px calc(22px + env(safe-area-inset-bottom));
    }

    .hero, .card {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero { padding: 18px; margin-bottom: 14px; }
    .card { padding: 16px; margin-bottom: 14px; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--line); background: rgba(255,255,255,.06);
      padding: 7px 12px; border-radius: 999px; color: var(--muted); font-size: 13px;
    }

    h1 { font-size: 28px; line-height: 1.08; margin: 12px 0 8px; }
    h2 { font-size: 18px; margin: 0 0 6px; }
    h3 { font-size: 15px; margin: 0 0 6px; }
    p { color: var(--muted); line-height: 1.55; margin: 0; }
    .small { font-size: 13px; color: var(--muted); }

    .top-actions, .chips, .tag-row, .quick-filters, .action-row {
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    button, select, input {
      font: inherit;
    }

    button {
      border: 0; cursor: pointer; color: inherit;
    }

    .btn {
      min-height: 44px; padding: 11px 14px; border-radius: 14px;
      background: rgba(255,255,255,.06); border: 1px solid var(--line);
      color: var(--text);
    }
    .btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; }
    .btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; }
    .btn.good { background: rgba(16,185,129,.16); border-color: rgba(16,185,129,.28); }
    .btn.warn { background: rgba(245,158,11,.16); border-color: rgba(245,158,11,.28); }

    .search, .select {
      width: 100%; min-height: 46px; margin-top: 12px; padding: 12px 14px;
      border-radius: 14px; border: 1px solid var(--line);
      background: rgba(255,255,255,.06); color: var(--text); outline: none;
    }
    .select option { color: #111827; }

    .weapon-scroller, .aspect-scroller, .god-scroller, .offer-scroller {
      display: grid; gap: 10px; grid-auto-flow: column; grid-auto-columns: 84%;
      overflow-x: auto; padding-bottom: 4px; scroll-snap-type: x proximity;
    }

    .weapon-card, .aspect-card, .god-card, .mini, .line-card, .check-item, .offer-card {
      border: 1px solid var(--line); background: var(--panel-2); border-radius: 18px;
    }

    .weapon-card {
      padding: 14px; display: grid; grid-template-columns: 54px 1fr; gap: 12px; align-items: center;
      scroll-snap-align: start;
    }
    .weapon-card.active, .aspect-card.active, .build-btn.active, .god-card.active, .offer-card.recommended { outline: 2px solid rgba(192,132,252,.7); }

    .weapon-icon, .god-icon {
      width: 54px; height: 54px; border-radius: 16px; display: grid; place-items: center;
      background: rgba(255,255,255,.08); font-size: 28px;
    }

    .hero-art {
      margin-top: 14px; padding: 16px; border-radius: 22px; border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(139,92,246,.25), rgba(244,114,182,.18));
      display: grid; gap: 12px; justify-items: center;
    }
    .main-art, .aspect-art {
      width: 100%; display: grid; place-items: center; border-radius: 22px;
      border: 1px solid var(--line); background: rgba(255,255,255,.05);
    }
    .main-art { min-height: 150px; font-size: 72px; }
    .aspect-art { min-height: 82px; font-size: 42px; }

    .stat-grid, .build-grid, .duo-grid, .two-up, .note-grid, .check-grid {
      display: grid; gap: 10px;
    }
    .stat-grid { grid-template-columns: repeat(2, 1fr); margin-top: 14px; }
    .build-grid { grid-template-columns: repeat(2, 1fr); }
    .duo-grid, .two-up, .note-grid, .check-grid { grid-template-columns: 1fr; }

    .stat label { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
    .bar > span { height: 100%; display: block; background: linear-gradient(90deg, #818cf8, #c084fc); }

    .aspect-card, .build-btn, .mini, .line-card, .check-item, .god-card, .offer-card { padding: 12px; }

    .aspect-preview {
      height: 68px; border-radius: 16px; margin-bottom: 10px;
      border: 1px solid var(--line); display: grid; place-items: center; font-size: 30px;
    }

    .god-card, .offer-card { text-align: left; width: 100%; }
    .god-top { display: flex; gap: 12px; align-items: center; }

    .duo {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center;
      border: 1px solid var(--line); border-radius: 18px; background: var(--panel-2); padding: 10px;
    }

    .chip, .tag {
      border-radius: 999px; padding: 6px 10px; font-size: 12px;
      background: rgba(139,92,246,.18); color: #e9d5ff; border: 1px solid rgba(139,92,246,.25);
    }
    .tag.good { background: rgba(16,185,129,.18); color: #bbf7d0; border-color: rgba(16,185,129,.28); }
    .tag.warn { background: rgba(245,158,11,.18); color: #fde68a; border-color: rgba(245,158,11,.28); }

    .callout {
      padding: 13px; border-radius: 16px; font-size: 14px; line-height: 1.55; border: 1px solid transparent;
    }
    .callout.ok { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.24); color: #a7f3d0; }
    .callout.warn { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.22); color: #fde68a; }
    .callout.info { background: rgba(99,102,241,.14); border-color: rgba(99,102,241,.25); color: #c7d2fe; }
    .callout.soft { background: rgba(255,255,255,.05); border-color: var(--line); color: var(--muted); }

    .quality { padding: 14px; border-radius: 18px; border: 1px solid var(--line); }
    .quality.ok { background: rgba(16,185,129,.12); }
    .quality.mid { background: rgba(59,130,246,.12); }
    .quality.warn { background: rgba(245,158,11,.12); }
    .quality.bad { background: rgba(244,63,94,.12); }
    .quality-top { display: flex; justify-content: space-between; gap: 10px; align-items: center; }

    .check-item { display: flex; gap: 10px; align-items: flex-start; }
    .check-item input { margin-top: 3px; transform: scale(1.15); }

    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
      border-top: 1px solid var(--line);
      background: rgba(11,16,32,.96);
      backdrop-filter: blur(12px);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      width: min(100%, 560px); margin: 0 auto;
    }
    .sheet button { min-height: 50px; border-radius: 16px; background: rgba(255,255,255,.05); border: 1px solid var(--line); font-size: 12px; }
    .sheet button.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="pill">📱 Hades II Mobile Companion v2</div>
      <h1>Ahora puedes avanzar estancia por estancia</h1>
      <p>Elige arma y build, luego marca qué dios te salió o qué opciones te ofrece la run. La app te recomendará cuál tomar y hacia dónde pivotear.</p>
      <div class="top-actions" style="margin-top:12px;">
        <button class="btn primary" id="quickStartBtn">Build inicial</button>
        <button class="btn" id="resetBtn">Reiniciar</button>
      </div>
    </div>

    <div class="card">
      <h2>Buscar arma</h2>
      <input class="search" id="searchInput" type="text" placeholder="Ej: axe, skull, rápida, burst..." />
      <div class="weapon-scroller" id="weaponList" style="margin-top:12px;"></div>
    </div>

    <div id="screen-overview"></div>
    <div id="screen-build" class="hidden"></div>
    <div id="screen-run" class="hidden"></div>
    <div id="screen-guide" class="hidden"></div>
  </div>

  <div class="sheet">
    <button class="active" data-screen="overview">Resumen</button>
    <button data-screen="build">Build</button>
    <button data-screen="run">Run</button>
    <button data-screen="guide">Guía</button>
  </div>

    const state = {
      selectedWeaponId: 'axe',
      selectedAspectId: 'melinoe',
      buildType: 'attack',
      goal: 'beginner',
      pickedGods: [],
      seenOffers: [],
      search: '',
      runState: { mainBoon:false, secondGod:false, duoPlan:false, magickPlan:false, survivalPlan:false },
      screen: 'overview',
    };

    const searchInput = document.getElementById('searchInput');
    const weaponList = document.getElementById('weaponList');
    const screens = {
      overview: document.getElementById('screen-overview'),
      build: document.getElementById('screen-build'),
      run: document.getElementById('screen-run'),
      guide: document.getElementById('screen-guide'),
    };

    document.getElementById('quickStartBtn').onclick = () => { state.selectedWeaponId='axe'; state.goal='beginner'; state.buildType='attack'; syncAspect(); render(); };
    document.getElementById('resetBtn').onclick = resetRun;
    searchInput.addEventListener('input', e => { state.search = e.target.value.toLowerCase().trim(); renderWeapons(); });

    document.querySelectorAll('.sheet button').forEach(btn => {
      btn.addEventListener('click', () => {
        state.screen = btn.dataset.screen;
        renderScreens();
      });
    });

    function getSelectedWeapon(){ return weapons.find(w => w.id === state.selectedWeaponId) || weapons[0]; }
    function syncAspect(){ const w = getSelectedWeapon(); if(!w.aspects.find(a => a.id === state.selectedAspectId)) state.selectedAspectId = w.aspects[0].id; }
    function getSelectedAspect(){ const w = getSelectedWeapon(); return w.aspects.find(a => a.id === state.selectedAspectId) || w.aspects[0]; }
    function getBuildInfo(){ return getSelectedAspect().buildTypes[state.buildType]; }
    function artEmoji(id){ return ({ staff:'🪄', blades:'🗡️', flames:'🔥', axe:'🪓', skull:'💀', coat:'🧥' })[id] || '✨'; }
    function aspectGradient(id){ return ({ melinoe:'linear-gradient(135deg,#f5d0fe,#ddd6fe,#e0e7ff)', circe:'linear-gradient(135deg,#ddd6fe,#f5d0fe,#ffe4e6)', momus:'linear-gradient(135deg,#fef3c7,#fed7aa,#fecdd3)', pan:'linear-gradient(135deg,#d1fae5,#ccfbf1,#cffafe)', artemis:'linear-gradient(135deg,#ecfccb,#d1fae5,#ccfbf1)', moros:'linear-gradient(135deg,#e2e8f0,#ddd6fe,#c7d2fe)', eos:'linear-gradient(135deg,#fef3c7,#fed7aa,#fecaca)', charon:'linear-gradient(135deg,#d6d3d1,#e7e5e4,#f5f5f4)', thanatos:'linear-gradient(135deg,#fecdd3,#fed7aa,#fde68a)', medea:'linear-gradient(135deg,#fecdd3,#fbcfe8,#f5d0fe)', persephone:'linear-gradient(135deg,#e0e7ff,#ddd6fe,#f5d0fe)', nyx:'linear-gradient(135deg,#cbd5e1,#c7d2fe,#ddd6fe)', xinth:'linear-gradient(135deg,#fdba74,#fecaca,#fde68a)' })[id] || 'linear-gradient(135deg,#f5d0fe,#ddd6fe,#e0e7ff)'; }

    function qualityInfo(score){
      if(score >= 80) return {label:'Sólida', cls:'ok'};
      if(score >= 60) return {label:'Encaminada', cls:'mid'};
      if(score >= 40) return {label:'Inestable', cls:'warn'};
      return {label:'Débil', cls:'bad'};
    }

    function godPriorityScore(godKey, buildInfo, aspect){
      let score = 0;
      if (buildInfo.gods[0] === godKey) score += 100;
      if (buildInfo.gods[1] === godKey) score += 80;
      if (buildInfo.gods[2] === godKey) score += 55;
      if (buildInfo.duo.includes(godKey)) score += 18;
      if (aspect.topGods.includes(godKey)) score += 12;
      if (state.pickedGods.includes(godKey)) score -= 45;
      if (buildInfo.avoid.includes(godKey)) score -= 70;
      return score;
    }

    function compute(){
      const weapon = getSelectedWeapon();
      const aspect = getSelectedAspect();
      const buildInfo = getBuildInfo();
      const altBuilds = Object.entries(aspect.buildTypes)
        .filter(([k]) => k !== state.buildType)
        .map(([key, info]) => ({ key, info, overlap: info.gods.filter(g => state.pickedGods.includes(g)).length }))
        .sort((a,b) => b.overlap - a.overlap);
      const bestPivot = altBuilds[0];
      const activePlanSupport = buildInfo.gods.filter(g => state.pickedGods.includes(g)).length;
      const hasMainGod = state.pickedGods.includes(buildInfo.gods[0]);
      const hasSecondGod = state.pickedGods.includes(buildInfo.gods[1]);
      const canPivot = state.pickedGods.length >= 2 && bestPivot && bestPivot.overlap > activePlanSupport;

      let score = 20;
      if (hasMainGod) score += 25;
      if (hasSecondGod) score += 15;
      score += Math.min(activePlanSupport, 3) * 12;
      score += Object.values(state.runState).filter(Boolean).length * 6;
      if (buildInfo.duo.every(g => state.pickedGods.includes(g))) score += 10;
      if (canPivot) score -= 8;
      score = Math.max(0, Math.min(100, score));

      const suggestedPath = {
        firstGod: buildInfo.gods[0],
        secondGod: buildInfo.gods[1],
        duo: buildInfo.duo,
        text: `Empieza intentando asegurar ${gods[buildInfo.gods[0]].name}. Luego busca ${gods[buildInfo.gods[1]].name} para completar la build y orientar tu run hacia la dupla ${gods[buildInfo.duo[0]].name} + ${gods[buildInfo.duo[1]].name}.`
      };

      const recommendationByGoal = {
        beginner: aspect.topGods.slice(0,3),
        bossing: [...new Set(['ares','aphrodite','hera',...aspect.topGods])].slice(0,4),
        safe: [...new Set(['demeter','apollo','hermes',...aspect.topGods])].slice(0,4),
        aggressive: [...new Set(['zeus','hestia','ares','aphrodite',...aspect.topGods])].slice(0,4),
      };

      let inRunAdvice = 'Aún no has marcado dioses tomados. Empieza por asegurar tu dios principal.';
      if (state.pickedGods.length) {
        if (canPivot && bestPivot) {
          const label = bestPivot.key === 'attack' ? 'Attack' : bestPivot.key === 'special' ? 'Special' : bestPivot.key === 'cast' ? 'Cast' : 'Omega';
          inRunAdvice = `Tu run sugiere un pivote: has tomado más piezas compatibles con ${label} que con tu plan actual.`;
        } else if (state.pickedGods.includes(suggestedPath.firstGod) && !state.pickedGods.includes(suggestedPath.secondGod)) {
          inRunAdvice = `Ya tienes ${gods[suggestedPath.firstGod].name}. Ahora prioriza ${gods[suggestedPath.secondGod].name}.`;
        } else if (state.pickedGods.includes(suggestedPath.firstGod) && state.pickedGods.includes(suggestedPath.secondGod)) {
          inRunAdvice = `Núcleo armado. Prioriza cerrar la dupla ${gods[suggestedPath.duo[0]].name} + ${gods[suggestedPath.duo[1]].name}.`;
        } else {
          inRunAdvice = `Ya tomaste ${state.pickedGods.map(g => gods[g].name).join(', ')}. Revisa si eso apoya tu plan de ${state.buildType}.`;
        }
      }

      let pivotMessage = 'Todavía no hay suficiente información para sugerir un pivote.';
      if (state.pickedGods.length) {
        if (!canPivot || !bestPivot) {
          pivotMessage = 'Tu plan actual sigue siendo el mejor camino.';
        } else {
          const label = bestPivot.key === 'attack' ? 'Attack' : bestPivot.key === 'special' ? 'Special' : bestPivot.key === 'cast' ? 'Cast' : 'Omega';
          const pivotGods = bestPivot.info.gods.slice(0,3).map(g => gods[g].name).join(', ');
          pivotMessage = `Conviene pivotear hacia ${label}. Prioriza ${pivotGods}.`;
        }
      }

      const checkGuidance = !state.runState.mainBoon
        ? 'Primero asegura un boon principal.'
        : state.runState.mainBoon && !state.runState.secondGod
        ? 'Ahora falta el dios complementario.'
        : state.runState.mainBoon && state.runState.secondGod && !state.runState.duoPlan
        ? 'Ya puedes orientar la run hacia una dupla.'
        : state.runState.duoPlan && !state.runState.magickPlan
        ? 'Revisa si tu Magick/Omega está resuelto.'
        : state.runState.magickPlan && !state.runState.survivalPlan
        ? 'Te queda revisar defensa y control.'
        : 'Tu build está bastante bien resuelta.';

      const nextRecommendedGod = allGodKeys
        .map(key => ({ key, score: godPriorityScore(key, buildInfo, aspect) }))
        .sort((a,b) => b.score - a.score)
        .find(item => !state.pickedGods.includes(item.key));

      const offeredRanked = state.seenOffers
        .map(key => ({ key, score: godPriorityScore(key, buildInfo, aspect) }))
        .sort((a,b) => b.score - a.score);

      const recommendedOffer = offeredRanked[0]?.key || null;

      return { weapon, aspect, buildInfo, bestPivot, activePlanSupport, hasMainGod, hasSecondGod, canPivot, score, suggestedPath, visibleGods: recommendationByGoal[state.goal], inRunAdvice, pivotMessage, checkGuidance, nextRecommendedGod, recommendedOffer, offeredRanked };
    }

    function stat(label, value){
      return `<div class="stat"><label><span>${label}</span><span>${value}/100</span></label><div class="bar"><span style="width:${value}%"></span></div></div>`;
    }

    function togglePickedGod(key){
      const idx = state.pickedGods.indexOf(key);
      if(idx >= 0) state.pickedGods.splice(idx,1);
      else state.pickedGods.push(key);
      state.seenOffers = state.seenOffers.filter(g => g !== key);
      render();
    }

    function toggleOffer(key){
      const idx = state.seenOffers.indexOf(key);
      if(idx >= 0) state.seenOffers.splice(idx,1);
      else state.seenOffers.push(key);
      render();
    }

    function addRecommendedOffer(){
      const { recommendedOffer } = compute();
      if (recommendedOffer) togglePickedGod(recommendedOffer);
    }

    function clearOffers(){
      state.seenOffers = [];
      render();
    }

    function selectWeapon(id){
      state.selectedWeaponId = id;
      state.pickedGods = [];
      state.seenOffers = [];
      state.runState = { mainBoon:false, secondGod:false, duoPlan:false, magickPlan:false, survivalPlan:false };
      syncAspect();
      render();
    }

    function setAspect(id){ state.selectedAspectId = id; state.pickedGods = []; state.seenOffers = []; render(); }
    function setBuildType(type){ state.buildType = type; state.pickedGods = []; state.seenOffers = []; render(); }
    function setGoal(goal){ state.goal = goal; render(); }
    function toggleCheck(key){ state.runState[key] = !state.runState[key]; render(); }
    function resetRun(){ state.goal='beginner'; state.buildType='attack'; state.pickedGods=[]; state.seenOffers=[]; state.runState={ mainBoon:false, secondGod:false, duoPlan:false, magickPlan:false, survivalPlan:false }; render(); }

    window.togglePickedGod = togglePickedGod;
    window.toggleOffer = toggleOffer;
    window.addRecommendedOffer = addRecommendedOffer;
    window.clearOffers = clearOffers;
    window.selectWeapon = selectWeapon;
    window.setAspect = setAspect;
    window.setBuildType = setBuildType;
    window.setGoal = setGoal;
    window.toggleCheck = toggleCheck;

    function renderWeapons(){
      const items = weapons.filter(w => !state.search || `${w.name} ${w.category} ${w.playstyle}`.toLowerCase().includes(state.search));
      weaponList.innerHTML = items.map(w => `
        <button class="weapon-card ${w.id===state.selectedWeaponId?'active':''}" onclick="selectWeapon('${w.id}')">
          <div class="weapon-icon">${w.icon}</div>
          <div>
            <div><strong>${w.name}</strong></div>
            <div class="small">${w.category}</div>
          </div>
        </button>
      `).join('');
    }

    function renderScreens(){
      Object.entries(screens).forEach(([key, el]) => el.classList.toggle('hidden', key !== state.screen));
      document.querySelectorAll('.sheet button').forEach(btn => btn.classList.toggle('active', btn.dataset.screen === state.screen));
    }

    function render(){
      syncAspect();
      renderWeapons();
      renderScreens();
      const { weapon, aspect, buildInfo, bestPivot, score, suggestedPath, visibleGods, inRunAdvice, pivotMessage, checkGuidance, nextRecommendedGod, recommendedOffer, offeredRanked } = compute();
      const q = qualityInfo(score);

      screens.overview.innerHTML = `
        <div class="card">
          <div class="pill">${weapon.category}</div>
          <h2 style="margin-top:10px; font-size:24px;">${weapon.name}</h2>
          <p>${weapon.playstyle}</p>
          <div class="hero-art">
            <div class="main-art">${artEmoji(weapon.id)}</div>
            <div class="aspect-art" style="background:${aspectGradient(aspect.id)};">${artEmoji(weapon.id)}</div>
          </div>
          <div class="stat-grid">
            ${stat('Velocidad', weapon.speed)}
            ${stat('Burst', weapon.burst)}
            ${stat('Control', weapon.control)}
            ${stat('Comodidad', weapon.comfort)}
          </div>
        </div>

        <div class="card">
          <h2>Estado de la build</h2>
          <div class="quality ${q.cls}" style="margin-top:10px;">
            <div class="quality-top"><span>Calidad estimada</span><span>${q.label}</span></div>
            <div style="font-size:30px;font-weight:800;margin-top:8px;">${score}/100</div>
            <div class="bar" style="margin-top:10px;"><span style="width:${score}%"></span></div>
          </div>
          <div class="callout info" style="margin-top:12px;">${inRunAdvice}</div>
        </div>

        <div class="card">
          <h2>Siguiente prioridad</h2>
          <div class="callout ok">${nextRecommendedGod ? `Si el próximo dios que ves es <strong>${gods[nextRecommendedGod.key].name}</strong>, normalmente conviene tomarlo.` : 'Ya tienes gran parte del núcleo. Ahora prioriza completar la dupla o corregir control/supervivencia.'}</div>
          <div class="chips" style="margin-top:12px;">
            ${state.pickedGods.length ? state.pickedGods.map(g => `<span class="chip">${gods[g].name}</span>`).join('') : '<span class="chip">Sin dioses tomados</span>'}
          </div>
        </div>
      `;

      screens.build.innerHTML = `
        <div class="card">
          <h2>Aspecto</h2>
          <div class="aspect-scroller" style="margin-top:12px;">
            ${weapon.aspects.map(a => `
              <button class="aspect-card ${a.id===state.selectedAspectId?'active':''}" onclick="setAspect('${a.id}')">
                <div class="aspect-preview" style="background:${aspectGradient(a.id)};">${artEmoji(weapon.id)}</div>
                <div><strong>${a.name}</strong></div>
                <div class="small">${a.style}</div>
                <div class="small">${a.focus}</div>
              </button>
            `).join('')}
          </div>
        </div>

        <div class="card">
          <h2>Tipo de build</h2>
          <div class="build-grid" style="margin-top:12px;">
            ${['attack','special','cast','omega'].map(type => {
              const label = type === 'attack' ? 'Attack' : type === 'special' ? 'Special' : type === 'cast' ? 'Cast' : 'Omega';
              return `<button class="build-btn ${state.buildType===type?'active':''}" onclick="setBuildType('${type}')"><strong>${label}</strong><div class="small">${type==='attack'?'Daño principal':type==='special'?'Plan de Special':type==='cast'?'Control y Cast':'Carga y Magick'}</div></button>`;
            }).join('')}
          </div>
          <div class="quick-filters" style="margin-top:12px;">
            ${[['beginner','Principiante'],['bossing','Jefes'],['safe','Seguro'],['aggressive','Agresiva']].map(([g,l]) => `<button class="btn ${state.goal===g?'active':''}" onclick="setGoal('${g}')">${l}</button>`).join('')}
          </div>
        </div>

        <div class="card">
          <h2>Ruta base</h2>
          <div class="callout info">${suggestedPath.text}</div>
          <div class="god-scroller" style="margin-top:12px;">
            ${visibleGods.map(g => `
              <button class="god-card ${state.pickedGods.includes(g)?'active':''}" onclick="togglePickedGod('${g}')">
                <div class="god-top">
                  <div class="god-icon" style="background:${gods[g].color}">${gods[g].icon}</div>
                  <div><strong>${gods[g].name}</strong><div class="small">${gods[g].type}</div></div>
                </div>
                <div class="small" style="margin-top:8px;">Toque para marcar que ya lo tomaste.</div>
              </button>
            `).join('')}
          </div>
        </div>
      `;

      screens.run.innerHTML = `
        <div class="card">
          <h2>Estancia actual: qué te salió</h2>
          <p class="small">Toca los dioses que te ofrece la run en esta estancia. Luego la app te dirá cuál conviene elegir.</p>
          <div class="offer-scroller" style="margin-top:12px;">
            ${allGodKeys.map(g => `
              <button class="offer-card ${recommendedOffer===g?'recommended':''}" onclick="toggleOffer('${g}')">
                <div class="god-top">
                  <div class="god-icon" style="background:${gods[g].color}">${gods[g].icon}</div>
                  <div><strong>${gods[g].name}</strong><div class="small">${state.seenOffers.includes(g)?'Marcado en esta estancia':'Tocar para marcar opción'}</div></div>
                </div>
              </button>
            `).join('')}
          </div>
        </div>

        <div class="card">
          <h2>Recomendación de esta estancia</h2>
          ${state.seenOffers.length ? `
            <div class="callout ok">${recommendedOffer ? `De las opciones marcadas, la mejor elección ahora suele ser <strong>${gods[recommendedOffer].name}</strong>.` : 'No hay una recomendación clara todavía.'}</div>
            <div class="tag-row" style="margin-top:12px;">
              ${offeredRanked.map(item => `<span class="tag ${item.key===recommendedOffer?'good':''} ${buildInfo.avoid.includes(item.key)?'warn':''}">${gods[item.key].name}</span>`).join('')}
            </div>
            <div class="action-row" style="margin-top:12px;">
              <button class="btn primary" onclick="addRecommendedOffer()">Tomé la recomendada</button>
              <button class="btn" onclick="clearOffers()">Limpiar opciones</button>
            </div>
          ` : `
            <div class="callout soft">Aún no has marcado opciones de esta estancia. Arriba toca los dioses que te aparecieron y aquí verás cuál conviene elegir.</div>
          `}
        </div>

        <div class="card">
          <h2>Dioses ya tomados</h2>
          <div class="chips" style="margin-top:10px;">
            ${state.pickedGods.length ? state.pickedGods.map(g => `<span class="chip">${gods[g].name}</span>`).join('') : '<span class="chip">Todavía no has confirmado ninguno</span>'}
          </div>
          <div class="callout warn" style="margin-top:12px;">Si elegiste un dios, usa <strong>Tomé la recomendada</strong> o tócala en la sección Build para dejarlo registrado.</div>
        </div>

        <div class="card">
          <h2>Pivoteo</h2>
          <div class="callout info">${pivotMessage}</div>
          ${bestPivot ? `<div class="tag-row" style="margin-top:12px;"><span class="tag">Plan alternativo: ${bestPivot.key === 'attack' ? 'Attack' : bestPivot.key === 'special' ? 'Special' : bestPivot.key === 'cast' ? 'Cast' : 'Omega'}</span><span class="tag">Compatibilidad: ${bestPivot.overlap}</span></div>` : ''}
        </div>

        <div class="card">
          <h2>Checklist</h2>
          <div class="check-grid" style="margin-top:12px;">
            ${[
              ['mainBoon','Ya encontré mi boon principal'],
              ['secondGod','Ya tengo mi segundo dios complementario'],
              ['duoPlan','Ya sé qué dupla quiero perseguir'],
              ['magickPlan','Mi Magick / Omega está resuelto'],
              ['survivalPlan','Tengo control o supervivencia suficiente'],
            ].map(([k,l]) => `<label class="check-item"><input type="checkbox" ${state.runState[k]?'checked':''} onchange="toggleCheck('${k}')" /><span>${l}</span></label>`).join('')}
          </div>
          <div class="callout soft" style="margin-top:12px;">${checkGuidance}</div>
        </div>
      `;

      screens.guide.innerHTML = `
        <div class="card">
          <h2>Cómo usar los botones</h2>
          <div class="callout info">1. En <strong>Build</strong> defines arma, aspecto y tipo de build. 2. En <strong>Run</strong> marcas los dioses que te ofrece la estancia. 3. Tocas <strong>Tomé la recomendada</strong> cuando eliges uno. 4. La app recalcula la siguiente prioridad.</div>
        </div>

        <div class="card">
          <h2>Dupla objetivo</h2>
          <div class="duo-grid" style="margin-top:12px;">
            ${aspect.duoPairs.map(([a,b]) => `
              <div class="duo">
                <div class="mini"><strong>${gods[a].icon} ${gods[a].name}</strong><div class="small">${gods[a].type}</div></div>
                <div class="small">+</div>
                <div class="mini"><strong>${gods[b].icon} ${gods[b].name}</strong><div class="small">${gods[b].type}</div></div>
              </div>
            `).join('')}
          </div>
          <div class="callout info" style="margin-top:12px;">Dupla sugerida para este plan: ${gods[buildInfo.duo[0]].name} + ${gods[buildInfo.duo[1]].name}</div>
        </div>

        <div class="card">
          <h2>Elementos sugeridos</h2>
          <div class="note-grid" style="margin-top:12px;">
            ${aspect.elements.map(key => `<div class="line-card"><strong>${elements[key].name}</strong><div class="small" style="margin-top:6px;">${elements[key].hint}</div></div>`).join('')}
          </div>
        </div>

        <div class="card">
          <h2>Martillos y keepsakes</h2>
          <div class="note-grid" style="margin-top:12px;">
            ${[...hammerAdviceByStyle[weapon.coreStyle], ...buildInfo.hammers].slice(0,4).map(t => `<div class="line-card">${t}</div>`).join('')}
            ${keepsakes[state.goal].map(t => `<div class="line-card">${t}</div>`).join('')}
          </div>
        </div>

        <div class="card">
          <h2>Priorizar / Evitar</h2>
          <div class="callout ok">${aspect.recommendedBoons.map(x => `• ${x}`).join('<br>')}</div>
          <div class="callout warn" style="margin-top:12px;">${aspect.avoidBoons.map(x => `• ${x}`).join('<br>')}</div>
        </div>
      `;
    }

    if ('serviceWorker' in navigator) {
      const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => self.clients.claim());`;
      const blob = new Blob([swCode], { type: 'text/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }

    render();
  </script>
</body>
</html>
